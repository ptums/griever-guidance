name: Deploy

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  pull-requests: write
  deployments: write

jobs:
  deploy-api:
    name: Deploy API → Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build lib dependencies so wrangler can resolve @griever/* imports
      - run: pnpm nx run-many -t build -p shared sms --parallel=3

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config apps/api/wrangler.toml

  deploy-web:
    name: Deploy Web → Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm nx run-many -t build -p shared hooks api-client ui-web --parallel=3

      - run: pnpm nx build web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: griever-guidance-web
          directory: apps/web/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-marketing:
    name: Deploy Marketing → Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm nx run-many -t build -p shared --parallel=3

      - run: pnpm nx build marketing
        env:
          PUBLIC_WEB_URL: ${{ secrets.PUBLIC_WEB_URL }}

      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: griever-guidance-marketing
          directory: apps/marketing/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
